<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Comics Reading List</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06050f; --panel:#0e0c1a; --panel2:#13111f;
  --border:#1e1b30; --border2:#2a2640;
  --yellow:#f9c74f; --red:#e63946; --blue:#4cc9f0;
  --green:#57cc04; --purple:#9b5de5; --orange:#f4a261;
  --text:#eeeaf8; --muted:#7a748f; --muted2:#5a5470;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;padding-bottom:80px;}

header{position:relative;background:linear-gradient(180deg,#0a0818 0%,#06050f 100%);border-bottom:1px solid var(--border2);padding:32px 20px 24px;text-align:center;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(230,57,70,.12) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 80% 50%,rgba(76,201,240,.10) 0%,transparent 70%),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px),repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px);}
header h1{font-family:'Bangers',cursive;font-size:3.2rem;letter-spacing:4px;color:var(--yellow);text-shadow:2px 2px 0 #c8820a,4px 4px 0 rgba(0,0,0,.8),0 0 40px rgba(249,199,79,.3);position:relative;line-height:1;}
header p{color:var(--muted);margin-top:8px;font-size:.88rem;position:relative;letter-spacing:1px;}
.sync-badge{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:.72rem;color:var(--muted2);background:rgba(255,255,255,.04);border:1px solid var(--border2);padding:3px 10px;border-radius:20px;position:relative;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.stats-bar{display:flex;justify-content:center;border-bottom:1px solid var(--border2);background:var(--panel);}
.stat{text-align:center;padding:16px 24px;border-right:1px solid var(--border);flex:1;max-width:180px;}
.stat:last-child{border-right:none;}
.stat-num{font-family:'Bangers',cursive;font-size:2rem;line-height:1;}
.stat-label{font-size:.65rem;color:var(--muted2);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
.stat-sub{font-size:.68rem;color:var(--muted);margin-top:1px;}

.global-progress{padding:16px 20px;max-width:960px;margin:0 auto;display:flex;align-items:center;gap:14px;}
.global-progress-label{font-size:.75rem;color:var(--muted);white-space:nowrap;}
.global-bar{flex:1;height:6px;background:var(--border2);border-radius:10px;overflow:hidden;}
.global-bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--yellow));border-radius:10px;transition:width .6s ease;}
.global-pct{font-family:'Bangers',cursive;font-size:1.1rem;color:var(--yellow);min-width:40px;text-align:right;}

.view-switcher{display:flex;justify-content:flex-start;gap:4px;padding:0 16px;max-width:960px;margin:12px auto 10px;}
.view-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:.75rem;padding:6px 16px;border-radius:6px;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;}
.view-btn.active{background:var(--yellow);border-color:var(--yellow);color:#06050f;font-weight:800;}

.tabs-wrap{padding:0 16px 14px;max-width:960px;margin:0 auto;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;}
.tab{background:var(--panel);border:1px solid var(--border2);color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:.72rem;padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px;}
.tab:hover,.tab.active{border-color:var(--tab-c,var(--yellow));color:var(--tab-c,var(--yellow));background:rgba(255,255,255,.03);}

.hero-wrap{max-width:960px;margin:0 auto;padding:0 16px;}
.hero-block{margin-bottom:32px;}
.hero-header-wrap{margin-bottom:10px;background:var(--panel);border:1px solid var(--border2);border-radius:10px;overflow:hidden;}
.hero-header-top{display:flex;align-items:center;gap:12px;padding:14px 16px 8px;}
.hero-name-big{font-family:'Bangers',cursive;font-size:1.8rem;letter-spacing:3px;line-height:1;text-shadow:2px 2px 0 rgba(0,0,0,.6);}
.hero-stats-row{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.hero-stats-text{font-size:.72rem;color:var(--muted);}
.hero-pct-big{font-family:'Bangers',cursive;font-size:1.5rem;line-height:1;}
.hero-seg-bar{display:flex;height:8px;gap:2px;padding:0 16px 14px;}
.hero-seg{flex:1;height:100%;border-radius:3px;background:var(--border2);transition:background .3s;min-width:3px;}
.hero-seg.done{background:var(--seg-c,var(--green));}
.hero-seg.partial{background:var(--seg-c,var(--yellow));opacity:.5;}

.arc{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--arc-c,var(--border));border-radius:8px;margin-bottom:7px;overflow:hidden;transition:border-color .2s;}
.arc.arc-done{border-left-color:var(--green);opacity:.6;}
.arc-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;}
.arc-header:hover{background:rgba(255,255,255,.02);}
.arc-name{font-weight:700;font-size:.92rem;flex:1;line-height:1.2;}
.arc-meta{font-size:.72rem;color:var(--muted);margin-top:2px;}
.arc-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.arc-prog-text{font-size:.72rem;color:var(--muted);}
.arc-chevron{font-size:.7rem;color:var(--muted2);transition:transform .2s;}
.arc.open .arc-chevron{transform:rotate(90deg);}
.arc-bar{height:2px;background:var(--border);}
.arc-bar-fill{height:100%;transition:width .4s;}
.arc-body{display:none;border-top:1px solid var(--border);}
.arc.open .arc-body{display:block;}
.arc-info{padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.stars-row{display:flex;gap:3px;}
.star{font-size:1.1rem;cursor:pointer;color:var(--border2);transition:color .15s;}
.star.active{color:var(--yellow);text-shadow:0 0 8px rgba(249,199,79,.5);}
.star:hover{color:var(--yellow);}
.note-btn{background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--muted);border-radius:6px;padding:3px 10px;font-size:.72rem;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.note-btn:hover{border-color:var(--yellow);color:var(--yellow);}
.note-preview{padding:0 14px 8px;font-size:.78rem;color:var(--muted);font-style:italic;border-left:2px solid var(--border2);margin:0 14px 6px;}
.arc-synopsis{padding:8px 14px;font-size:.8rem;color:#9994b0;line-height:1.6;background:rgba(255,255,255,.02);}
.arc-salvat{margin:0 14px 8px;font-size:.7rem;color:var(--yellow);background:rgba(249,199,79,.06);border:1px solid rgba(249,199,79,.2);border-radius:6px;padding:6px 10px;line-height:1.5;}
.vols-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;padding:10px 14px 14px;}
.vol-item{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all .15s;}
.vol-item:hover{border-color:var(--arc-c,var(--yellow));background:rgba(255,255,255,.02);}
.vol-item.done{background:rgba(87,204,4,.06);border-color:rgba(87,204,4,.3);}
.vol-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;color:var(--muted2);transition:all .15s;}
.vol-item.done .vol-check{background:var(--green);border-color:var(--green);color:#000;font-weight:800;}
.vol-label{font-size:.74rem;font-weight:600;line-height:1.2;color:var(--muted);}
.vol-item.done .vol-label{color:var(--text);}

.badge{font-size:.62rem;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.badge-must{background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.4);}
.badge-great{background:rgba(76,201,240,.1);color:var(--blue);border:1px solid rgba(76,201,240,.35);}
.badge-classic{background:rgba(249,199,79,.1);color:var(--yellow);border:1px solid rgba(249,199,79,.35);}
.badge-legend{background:rgba(155,93,229,.12);color:var(--purple);border:1px solid rgba(155,93,229,.4);}

.order-wrap{max-width:960px;margin:0 auto;padding:0 16px;}
.order-info{font-size:.78rem;color:var(--muted);background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;margin-bottom:12px;line-height:1.5;}
.order-step{background:var(--panel2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden;display:flex;align-items:stretch;}
.order-step.done{opacity:.45;}
.order-step-num{font-family:'Bangers',cursive;font-size:1.4rem;color:var(--muted2);min-width:46px;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);background:rgba(255,255,255,.02);}
.order-step.done .order-step-num{color:var(--green);}
.order-step-body{flex:1;padding:10px 12px;cursor:pointer;}
.order-step-body:hover{background:rgba(255,255,255,.02);}
.order-step-hero{font-size:.65rem;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.order-step-name{font-weight:700;font-size:.9rem;line-height:1.2;}
.order-step-author{font-size:.72rem;color:var(--muted);font-style:italic;margin-top:1px;}
.order-step-tip{font-size:.75rem;color:#9994b0;margin-top:6px;border-top:1px solid var(--border);padding-top:5px;line-height:1.4;}
.order-step-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:10px 12px;gap:5px;}
.order-vols{display:none;}
.order-vols.open{display:block;padding:4px 12px 12px 58px;}
.mixed-step{border-left:3px solid var(--step-c,var(--border));background:var(--panel2);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);border-radius:0 8px 8px 0;margin-bottom:6px;overflow:hidden;}
.mixed-step.done{opacity:.45;}
.mixed-header{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;}
.mixed-header:hover{background:rgba(255,255,255,.02);}
.mixed-num{font-family:'Bangers',cursive;font-size:1.2rem;color:var(--step-c,var(--muted));min-width:28px;}
.mixed-tag{font-size:.62rem;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;border:1px solid var(--step-c,var(--border));color:var(--step-c,var(--muted));background:rgba(255,255,255,.03);white-space:nowrap;}
.mixed-name{font-weight:700;font-size:.88rem;flex:1;}
.mixed-tip{padding:0 12px 8px 48px;font-size:.75rem;color:#9994b0;line-height:1.4;}
.mixed-vols{display:none;}
.mixed-vols.open{display:block;padding:0 12px 10px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--panel);border:1px solid var(--border2);border-radius:12px;padding:20px;width:100%;max-width:480px;}
.modal-title{font-family:'Bangers',cursive;font-size:1.4rem;color:var(--yellow);letter-spacing:2px;margin-bottom:12px;}
.modal-textarea{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:10px;font-family:'Nunito',sans-serif;font-size:.88rem;resize:vertical;min-height:120px;outline:none;}
.modal-textarea:focus{border-color:var(--yellow);}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
.modal-btn{font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;padding:7px 18px;border-radius:6px;cursor:pointer;border:none;}
.modal-btn.save{background:var(--yellow);color:#06050f;}
.modal-btn.cancel{background:var(--border2);color:var(--muted);}

@media(max-width:500px){
  header h1{font-size:2.2rem;}
  .stat{padding:12px 14px;}
  .vols-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));}
}
</style>
</head>
<body>

<header>
  <h1>📚 COMICS LIST</h1>
  <p>VOLUME A VOLUME · MARCA O QUE LESTE</p>
  <div class="sync-badge">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text">A carregar...</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="s-total-arcs" style="color:var(--yellow)">0</div><div class="stat-label">Livros</div><div class="stat-sub" id="s-total-vols">0 vol</div></div>
  <div class="stat"><div class="stat-num" id="s-done-arcs" style="color:var(--green)">0</div><div class="stat-label">Lidos</div><div class="stat-sub" id="s-done-vols">0 vol</div></div>
  <div class="stat"><div class="stat-num" id="s-left-arcs" style="color:var(--blue)">0</div><div class="stat-label">Por Ler</div><div class="stat-sub" id="s-left-vols">0 vol</div></div>
  <div class="stat"><div class="stat-num" id="s-pct2" style="color:var(--red)">0%</div><div class="stat-label">Completo</div><div class="stat-sub">por volumes</div></div>
</div>

<div class="global-progress">
  <span class="global-progress-label">Progresso</span>
  <div class="global-bar"><div class="global-bar-fill" id="s-bar" style="width:0%"></div></div>
  <span class="global-pct" id="s-pct">0%</span>
</div>

<div style="max-width:960px;margin:0 auto;padding:12px 16px 0">
  <div class="view-switcher" id="view-switcher">
    <button class="view-btn active" data-view="library">📚 Biblioteca</button>
    <button class="view-btn" data-view="order">🎯 Por Personagem</button>
    <button class="view-btn" data-view="mixed">🔀 Misturada</button>
    <button class="view-btn" id="hidden-toggle-btn" data-action="toggle-hidden" style="margin-left:auto;border-color:var(--muted2);font-size:.68rem">👁 Ocultos</button>
  </div>
</div>
<div class="tabs-wrap" id="tabs-wrap"><div class="tabs" id="tabs"></div></div>

<div id="app"></div>

<div class="modal-overlay" id="note-modal">
  <div class="modal-box">
    <div class="modal-title">📝 NOTA PESSOAL</div>
    <textarea class="modal-textarea" id="note-textarea" placeholder="Escreve a tua opinião, quando leste, o que achaste..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="modal-cancel-btn">Cancelar</button>
      <button class="modal-btn save" id="modal-save-btn">Guardar</button>
    </div>
  </div>
</div>

<script>

function vols(prefix, n, readUpTo) {
  readUpTo = readUpTo || 0;
  return Array.from({length: n}, function(_, i) {
    return { label: prefix + ' ' + (i + 1), read: i < readUpTo };
  });
}

// ── DATA ──────────────────────────────────────────────────────────────────────

    { name:'Spider-Man: Blue', author:'Jeph Loeb + Tim Sale', badge:'great', badgeLabel:'Excelente',
      volumes: vols('Issue',6) },
    { name:'Ultimate Spider-Man', author:'Brian Michael Bendis', badge:'great', badgeLabel:'Excelente',
      volumes: vols('Vol',7) },
  ]},

  { id:'daredevil', group:'marvel-solo', name:'😈 Demolidor', color:'#f9c74f', arcs:[
    { name:'Homem Sem Medo (Zdarsky)', author:'Chip Zdarsky', badge:'must', badgeLabel:'Obrigatório',
      volumes:[ {label:'Vol 1',read:true},{label:'Vol 2',read:true},{label:'Vol 3',read:true},{label:'Vol 4',read:true},{label:'Vol 5',read:true},{label:'Vol 6',read:true} ] },
    { name:'Demolidor (2019) — Continuação', author:'Chip Zdarsky', badge:'must', badgeLabel:'Obrigatório',
      volumes: Array.from({length:36}, function(_,i){ return {label:'Issue #'+(i+1), read:false}; }) },
    { name:'Reinado do Demônio', author:'Chip Zdarsky', badge:'must', badgeLabel:'Obrigatório',

    { name:'Guardian Devil', author:'Kevin Smith', badge:'great', badgeLabel:'Excelente',

  { id:'marvels', group:'marvel-solo', name:'📸 Marvels', color:'#f4a261', arcs:[

// ── SUPABASE ──────────────────────────────────────────────────────────────────
var SUPA_URL = 'https://qlfcthjpoerndaizfnkt.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZmN0aGpwb2VybmRhaXpmbmt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDY3MDUsImV4cCI6MjA5NTk4MjcwNX0.89MZq2Fe0vY9dKo91ismp4MEQfJlha6V45_fcsuEBKI';
var USER_ID = 'joaopedrob562';

// ── STATE ─────────────────────────────────────────────────────────────────────
var stored = {};
var notesData = {};
var openArcs = {};
var activeView = 'library';
var activeGroup = 'all';
var showHidden = false;

function seedDefaults() {
  HEROES.forEach(function(h) {
    h.arcs.forEach(function(a, ai) {
      a.volumes.forEach(function(v, vi) {
        var k = h.id + '.' + ai + '.' + vi;
        if (v.read && stored[k] === undefined) stored[k] = true;
      });
    });
  });
}

try { stored = JSON.parse(localStorage.getItem('rl4') || '{}'); } catch(e) { stored = {}; }
try { notesData = JSON.parse(localStorage.getItem('notesData') || '{}'); } catch(e) { notesData = {}; }
seedDefaults();

function isRead(hid, ai, vi) { return !!stored[hid + '.' + ai + '.' + vi]; }

function arcDone(hid, ai) {
  return HEROES.find(function(h) { return h.id === hid; }).arcs[ai].volumes.every(function(_, vi) { return isRead(hid, ai, vi); });
}
function arcProgress(hid, ai) {
  var arc = HEROES.find(function(h) { return h.id === hid; }).arcs[ai];
  var done = arc.volumes.filter(function(_, vi) { return isRead(hid, ai, vi); }).length;
  return { done: done, total: arc.volumes.length };
}

function toggle(hid, ai, vi) {
  var k = hid + '.' + ai + '.' + vi;
  stored[k] = !stored[k];
  localStorage.setItem('rl4', JSON.stringify(stored));
  render();
  if (stored[k]) {
    fetch(SUPA_URL + '/rest/v1/reads', { method: 'POST', headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'ignore-duplicates' }, body: JSON.stringify([{ id: k, user_id: USER_ID }]) }).catch(function(){});
  } else {
    fetch(SUPA_URL + '/rest/v1/reads?id=eq.' + k + '&user_id=eq.' + USER_ID, { method: 'DELETE', headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY } }).catch(function(){});
  }
}

function syncFromCloud() {
  Promise.all([
    fetch(SUPA_URL + '/rest/v1/reads?user_id=eq.' + USER_ID + '&select=id', { headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY } }),
    fetch(SUPA_URL + '/rest/v1/notes?user_id=eq.' + USER_ID + '&select=arc_id,note,rating', { headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY } })
  ]).then(function(responses) {
    return Promise.all([responses[0].json(), responses[1].json()]);
  }).then(function(results) {
    var reads = results[0];
    var notes = results[1];
    if (Array.isArray(reads)) {
      reads.forEach(function(r) { stored[r.id] = true; });
      seedDefaults();
      localStorage.setItem('rl4', JSON.stringify(stored));
    }
    if (Array.isArray(notes)) {
      notes.forEach(function(r) { notesData[r.arc_id] = { note: r.note || '', rating: r.rating || 0 }; });
      localStorage.setItem('notesData', JSON.stringify(notesData));
    }
    var dot = document.getElementById('sync-dot');
    dot.style.cssText = 'background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;width:6px;height:6px;border-radius:50%';
    document.getElementById('sync-text').textContent = 'Sincronizado';
    render();
  }).catch(function() {
    document.getElementById('sync-text').textContent = 'Offline';
  });
}

// ── NOTES ─────────────────────────────────────────────────────────────────────
function saveNote(arcId, note, rating) {
  notesData[arcId] = { note: note, rating: rating };
  localStorage.setItem('notesData', JSON.stringify(notesData));
  fetch(SUPA_URL + '/rest/v1/notes', { method: 'POST', headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' }, body: JSON.stringify([{ arc_id: arcId, user_id: USER_ID, note: note, rating: rating, updated_at: new Date().toISOString() }]) }).catch(function(){});
}
function setRating(arcId, rating) {
  var cur = (notesData[arcId] || {}).rating || 0;
  var newR = cur === rating ? 0 : rating;
  saveNote(arcId, (notesData[arcId] || {}).note || '', newR);
  render();
}
function openNote(arcId) {
  var modal = document.getElementById('note-modal');
  document.getElementById('note-textarea').value = (notesData[arcId] || {}).note || '';
  modal.dataset.arcId = arcId;
  modal.classList.add('open');
  setTimeout(function() { document.getElementById('note-textarea').focus(); }, 100);
}
function closeNote() { document.getElementById('note-modal').classList.remove('open'); }
function saveNoteFromModal() {
  var modal = document.getElementById('note-modal');
  var arcId = modal.dataset.arcId;
  var note = document.getElementById('note-textarea').value;
  var rating = (notesData[arcId] || {}).rating || 0;
  saveNote(arcId, note, rating);
  closeNote();
  render();
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function setView(v) {
  activeView = v;
  document.querySelectorAll('.view-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.view === v);
  });
  document.getElementById('tabs-wrap').style.display = v === 'library' ? '' : 'none';
  render();
}
function setGroup(id) { activeGroup = id; render(); }
function toggleArc(key) { openArcs[key] = !openArcs[key]; render(); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function updateStats() {
  var tA=0, dA=0, tV=0, dV=0;
  HEROES.forEach(function(h) {
    h.arcs.forEach(function(a, ai) {
      tA++; if (arcDone(h.id, ai)) dA++;
      a.volumes.forEach(function(_, vi) { tV++; if (isRead(h.id, ai, vi)) dV++; });
    });
  });
  var pct = tV > 0 ? Math.round(dV / tV * 100) : 0;
  document.getElementById('s-total-arcs').textContent = tA;
  document.getElementById('s-total-vols').textContent = tV + ' vol';
  document.getElementById('s-done-arcs').textContent = dA;
  document.getElementById('s-done-vols').textContent = dV + ' vol';
  document.getElementById('s-left-arcs').textContent = tA - dA;
  document.getElementById('s-left-vols').textContent = (tV - dV) + ' vol';
  document.getElementById('s-pct2').textContent = pct + '%';
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('s-bar').style.width = pct + '%';
}

function renderTabs() {
  var parts = ['<button class="tab ' + (activeGroup === 'all' ? 'active' : '') + '" style="--tab-c:var(--yellow)" data-group="all">Todos</button>'];
  GROUPS.forEach(function(g) {
    parts.push('<button class="tab ' + (activeGroup === g.id ? 'active' : '') + '" style="--tab-c:' + g.color + '" data-group="' + g.id + '">' + g.label + '</button>');
  });
  document.getElementById('tabs').innerHTML = parts.join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function volsHtml(h, arc, ai) {
  return arc.volumes.map(function(v, vi) {
    var rd = isRead(h.id, ai, vi);
    return '<div class="vol-item ' + (rd ? 'done' : '') + '" data-toggle="' + esc(h.id) + '|' + ai + '|' + vi + '" style="--arc-c:' + h.color + '">'
      + '<div class="vol-check">' + (rd ? '✓' : '') + '</div>'
      + '<div class="vol-label">' + esc(v.label) + '</div>'
      + '</div>';
  }).join('');
}

function renderArc(h, arc, ai) {
  var p = arcProgress(h.id, ai);
  var pct = p.total > 0 ? Math.round(p.done / p.total * 100) : 0;
  var isDone = p.done === p.total;
  var key = h.id + '.' + ai;
  var isOpen = !!openArcs[key];
  var nd = notesData[key] || { note: '', rating: 0 };
  var stars = [1,2,3,4,5].map(function(i) {
    return '<span class="star ' + (nd.rating >= i ? 'active' : '') + '" data-rate="' + esc(key) + '|' + i + '">★</span>';
  }).join('');

  var body = '';
  if (isOpen) {
    body += '<div class="arc-info">'
      + '<div class="stars-row">' + stars + '</div>'
      + '<button class="note-btn" data-note="' + esc(key) + '">' + (nd.note ? '📝 Ver nota' : '📝 Nota') + '</button>'
      + '</div>';
    if (nd.note) body += '<div class="note-preview">' + esc(nd.note) + '</div>';
    if (arc.synopsis) body += '<div class="arc-synopsis">📖 ' + arc.synopsis + '</div>';
    if (arc.salvatNote) body += '<div class="arc-salvat">ℹ️ ' + arc.salvatNote + '</div>';
    body += '<div class="vols-grid">' + volsHtml(h, arc, ai) + '</div>';
  }

  return '<div class="arc ' + (isDone ? 'arc-done' : '') + ' ' + (isOpen ? 'open' : '') + '" style="--arc-c:' + h.color + '">'
    + '<div class="arc-header" data-arc="' + esc(key) + '">'
    + '<div><div class="arc-name">' + esc(arc.name) + (isDone ? ' <span style="color:var(--green);font-size:.75rem">✓</span>' : '') + '</div>'
    + '<div class="arc-meta">' + esc(arc.author) + '</div></div>'
    + '<div class="arc-right">'
    + '<span class="badge badge-' + arc.badge + '">' + arc.badgeLabel + '</span>'
    + '<span class="arc-prog-text">' + p.done + '/' + p.total + '</span>'
    + '<span class="arc-chevron">▶</span>'
    + '</div></div>'
    + '<div class="arc-bar"><div class="arc-bar-fill" style="width:' + pct + '%;background:' + h.color + '"></div></div>'
    + '<div class="arc-body">' + body + '</div>'
    + '</div>';
}

function heroHtml(h) {
  var totalV = h.arcs.reduce(function(s, a) { return s + a.volumes.length; }, 0);
  var doneV  = h.arcs.reduce(function(s, a, ai) { return s + a.volumes.filter(function(_, vi) { return isRead(h.id, ai, vi); }).length; }, 0);
  var totalA = h.arcs.length;
  var doneA  = h.arcs.filter(function(_, ai) { return arcDone(h.id, ai); }).length;
  var pct = totalV > 0 ? Math.round(doneV / totalV * 100) : 0;

  var segs = h.arcs.map(function(a, ai) {
    var p = arcProgress(h.id, ai);
    var cls = p.done === p.total ? 'done' : p.done > 0 ? 'partial' : '';
    return '<div class="hero-seg ' + cls + '" style="--seg-c:' + h.color + '" title="' + esc(a.name) + ' ' + p.done + '/' + p.total + '"></div>';
  }).join('');

  return '<div class="hero-block">'
    + '<div class="hero-header-wrap" style="border-color:' + h.color + '33">'
    + '<div class="hero-header-top">'
    + '<div class="hero-name-big" style="color:' + h.color + '">' + h.name + '</div>'
    + '<div class="hero-stats-row">'
    + '<div class="hero-pct-big" style="color:' + h.color + '">' + pct + '%</div>'
    + '<div class="hero-stats-text">' + doneA + '/' + totalA + ' livros · ' + doneV + '/' + totalV + ' vol</div>'
    + '</div></div>'
    + '<div class="hero-seg-bar">' + segs + '</div>'
    + '</div>'
    + h.arcs.filter(function(arc) { return showHidden || !arc.hidden; }).map(function(arc, ai) {
      var realAi = h.arcs.indexOf(arc);
      return renderArc(h, arc, realAi);
    }).join('')
    + '</div>';
}

function render() {
  renderTabs();
  updateStats();
  var app = document.getElementById('app');

  if (activeView === 'library') {
    var heroes = activeGroup === 'all' ? HEROES : HEROES.filter(function(h) { return h.group === activeGroup; });
    app.innerHTML = '<div class="hero-wrap">' + heroes.map(heroHtml).join('') + '</div>';
    return;
  }

  var list = activeView === 'order' ? ORDER_BY_CHAR : ORDER_MIXED;
  var isOrd = activeView === 'order';
  var info = isOrd
    ? '🎯 <strong style="color:var(--yellow)">Por personagem</strong> — terminas cada herói antes de passar ao seguinte.'
    : '🔀 <strong style="color:var(--yellow)">Ordem misturada</strong> — alternância recomendada para não te aborreces.';

  var html = '<div class="order-wrap"><div class="order-info">' + info + '</div>';

  list.forEach(function(entry, idx) {
    var h = HEROES.find(function(x) { return x.id === entry.hid; });
    if (!h) return;
    var arc = h.arcs[entry.ai];
    if (!arc) return;
    var p = arcProgress(h.id, entry.ai);
    var isDone = p.done === p.total;
    var key = (isOrd ? 'ord-' : 'mix-') + h.id + '.' + entry.ai;
    var isOpen = !!openArcs[key];

    if (isOrd) {
      html += '<div class="order-step ' + (isDone ? 'done' : '') + '">'
        + '<div class="order-step-num">' + (idx + 1) + '</div>'
        + '<div class="order-step-body" data-arc="' + esc(key) + '">'
        + '<div class="order-step-hero" style="color:' + h.color + '">' + h.name + '</div>'
        + '<div class="order-step-name">' + esc(arc.name) + '</div>'
        + '<div class="order-step-author">' + esc(arc.author) + '</div>'
        + (entry.tip ? '<div class="order-step-tip">💡 ' + esc(entry.tip) + '</div>' : '')
        + '</div>'
        + '<div class="order-step-right"><span class="badge badge-' + arc.badge + '">' + arc.badgeLabel + '</span><span style="font-size:.7rem;color:var(--muted)">' + p.done + '/' + p.total + '</span></div>'
        + '</div>'
        + '<div class="order-vols ' + (isOpen ? 'open' : '') + '"><div class="vols-grid">' + volsHtml(h, arc, entry.ai) + '</div></div>';
    } else {
      html += '<div class="mixed-step ' + (isDone ? 'done' : '') + '" style="--step-c:' + h.color + '">'
        + '<div class="mixed-header" data-arc="' + esc(key) + '">'
        + '<div class="mixed-num">' + (idx + 1) + '</div>'
        + '<div class="mixed-tag">' + h.name + '</div>'
        + '<div class="mixed-name">' + esc(arc.name) + '</div>'
        + '<span style="font-size:.7rem;color:var(--muted)">' + p.done + '/' + p.total + '</span>'
        + '</div>'
        + (entry.tip ? '<div class="mixed-tip">💡 ' + esc(entry.tip) + '</div>' : '')
        + '<div class="mixed-vols ' + (isOpen ? 'open' : '') + '"><div class="vols-grid">' + volsHtml(h, arc, entry.ai) + '</div></div>'
        + '</div>';
    }
  });

  app.innerHTML = html + '</div>';
}

// ── EVENT DELEGATION ──────────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  // Hidden toggle
  var hiddenBtn = e.target.closest('[data-action="toggle-hidden"]');
  if (hiddenBtn) {
    showHidden = !showHidden;
    hiddenBtn.classList.toggle('active', showHidden);
    hiddenBtn.style.borderColor = showHidden ? 'var(--purple)' : 'var(--muted2)';
    hiddenBtn.style.color = showHidden ? 'var(--purple)' : '';
    render(); return;
  }
  // View switcher
  var viewBtn = e.target.closest('[data-view]');
  if (viewBtn) { setView(viewBtn.dataset.view); return; }

  // Tab group
  var tabBtn = e.target.closest('[data-group]');
  if (tabBtn) { setGroup(tabBtn.dataset.group); return; }

  // Arc toggle (headers)
  var arcHeader = e.target.closest('[data-arc]');
  if (arcHeader && !e.target.closest('[data-rate]') && !e.target.closest('[data-note]')) {
    toggleArc(arcHeader.dataset.arc); return;
  }

  // Star rating
  var star = e.target.closest('[data-rate]');
  if (star) {
    var parts = star.dataset.rate.split('|');
    setRating(parts[0], parseInt(parts[1], 10)); return;
  }

  // Note button
  var noteBtn = e.target.closest('[data-note]');
  if (noteBtn) { openNote(noteBtn.dataset.note); return; }

  // Volume toggle
  var vol = e.target.closest('[data-toggle]');
  if (vol) {
    var tp = vol.dataset.toggle.split('|');
    toggle(tp[0], parseInt(tp[1], 10), parseInt(tp[2], 10)); return;
  }
});

// Modal buttons
document.getElementById('modal-cancel-btn').addEventListener('click', closeNote);
document.getElementById('modal-save-btn').addEventListener('click', saveNoteFromModal);

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
syncFromCloud();
</script>
