<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Minha Reading List de HQs</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17; --panel: #1a1828; --border: #2e2b45;
    --yellow: #f9c74f; --red: #e63946; --blue: #4cc9f0;
    --green: #80b918; --purple: #9b5de5; --text: #fffffe; --muted: #a7a4c0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; padding-bottom: 80px;
    background-image: radial-gradient(ellipse at 10% 20%, rgba(155,93,229,0.07) 0%, transparent 50%), radial-gradient(ellipse at 90% 80%, rgba(230,57,70,0.07) 0%, transparent 50%); }

  header { background: var(--panel); border-bottom: 3px solid var(--yellow); padding: 24px; text-align: center; position: relative; overflow: hidden; }
  header::before { content:''; position:absolute; inset:0; background: repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(249,199,79,0.03) 10px,rgba(249,199,79,0.03) 20px); }
  header h1 { font-family:'Bangers',cursive; font-size:2.8rem; letter-spacing:3px; color:var(--yellow); text-shadow:3px 3px 0 var(--red),6px 6px 0 rgba(0,0,0,0.5); position:relative; }
  header p { color:var(--muted); margin-top:6px; font-size:0.9rem; position:relative; }

  .stats-bar { display:flex; justify-content:center; gap:28px; padding:14px 24px; background:rgba(249,199,79,0.05); border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .stat { text-align:center; }
  .stat-num { font-family:'Bangers',cursive; font-size:1.7rem; color:var(--yellow); line-height:1; }
  .stat-label { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .stat-sub { font-size:0.7rem; color:var(--muted); margin-top:1px; }

  .progress-wrap { padding:14px 20px 0; max-width:960px; margin:0 auto; }
  .progress-label { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--muted); margin-bottom:5px; }
  .progress-bar { height:7px; background:var(--border); border-radius:10px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--yellow),var(--red)); border-radius:10px; transition:width 0.5s; }

  /* VIEW SWITCHER */
  .view-switcher { display:flex; justify-content:center; gap:6px; padding:16px 16px 0; max-width:960px; margin:0 auto; }
  .view-btn { background:var(--panel); border:2px solid var(--border); color:var(--muted); font-family:'Nunito',sans-serif; font-weight:700; font-size:0.8rem; padding:7px 18px; border-radius:20px; cursor:pointer; transition:all 0.2s; }
  .view-btn.active { border-color:var(--yellow); color:var(--yellow); background:rgba(249,199,79,0.08); }

  /* TABS */
  .tabs-wrap { padding:10px 16px 0; max-width:960px; margin:0 auto; }
  .tabs { display:flex; gap:6px; flex-wrap:wrap; }
  .tab { background:var(--panel); border:2px solid var(--border); color:var(--muted); font-family:'Nunito',sans-serif; font-weight:700; font-size:0.75rem; padding:5px 14px; border-radius:8px; cursor:pointer; transition:all 0.2s; text-transform:uppercase; letter-spacing:1px; }
  .tab:hover,.tab.active { border-color:var(--tab-c,var(--yellow)); color:var(--tab-c,var(--yellow)); background:rgba(255,255,255,0.04); }

  /* HERO WRAP */
  .hero-wrap { max-width:960px; margin:20px auto 0; padding:0 16px; }
  .hero-block { margin-bottom:32px; }
  .hero-title { font-family:'Bangers',cursive; font-size:1.6rem; letter-spacing:2px; margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid var(--border); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .hero-prog { margin-left:auto; font-size:0.72rem; color:var(--muted); background:var(--panel); border:1px solid var(--border); padding:4px 10px; border-radius:12px; font-family:'Nunito',sans-serif; white-space:nowrap; }

  /* ORDER VIEW — numbered steps */
  .order-step { background:var(--panel); border:2px solid var(--border); border-radius:12px; margin-bottom:10px; overflow:hidden; display:flex; align-items:stretch; transition:border-color 0.2s; }
  .order-step.done { opacity:0.55; border-color:var(--green); }
  .order-step-num { font-family:'Bangers',cursive; font-size:1.6rem; color:var(--yellow); min-width:52px; display:flex; align-items:center; justify-content:center; background:rgba(249,199,79,0.06); border-right:2px solid var(--border); padding:0 10px; }
  .order-step.done .order-step-num { color:var(--green); background:rgba(128,185,24,0.08); border-color:var(--green); }
  .order-step-body { flex:1; padding:12px 14px; cursor:pointer; }
  .order-step-body:hover { background:rgba(255,255,255,0.02); }
  .order-step-hero { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
  .order-step-name { font-weight:700; font-size:0.95rem; line-height:1.3; }
  .order-step-author { font-size:0.75rem; color:var(--muted); font-style:italic; margin-top:2px; }
  .order-step-tip { font-size:0.78rem; color:#c8c5d8; margin-top:6px; line-height:1.4; border-top:1px solid var(--border); padding-top:6px; }
  .order-step-right { display:flex; flex-direction:column; align-items:flex-end; justify-content:center; padding:10px 14px; gap:6px; }

  /* MIXED VIEW */
  .mixed-step { background:var(--panel); border-left:4px solid var(--step-c,var(--yellow)); border-radius:0 12px 12px 0; border-top:1px solid var(--border); border-right:1px solid var(--border); border-bottom:1px solid var(--border); margin-bottom:8px; overflow:hidden; }
  .mixed-step.done { opacity:0.55; }
  .mixed-header { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; }
  .mixed-header:hover { background:rgba(255,255,255,0.02); }
  .mixed-num { font-family:'Bangers',cursive; font-size:1.3rem; color:var(--step-c,var(--yellow)); min-width:30px; }
  .mixed-hero-tag { font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:8px; text-transform:uppercase; letter-spacing:0.4px; background:rgba(255,255,255,0.06); color:var(--step-c,var(--yellow)); border:1px solid var(--step-c,var(--yellow)); white-space:nowrap; }
  .mixed-name { font-weight:700; font-size:0.9rem; flex:1; }
  .mixed-check { width:26px; height:26px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.8rem; cursor:pointer; transition:all 0.18s; color:var(--muted); flex-shrink:0; }
  .mixed-step.done .mixed-check { background:var(--green); border-color:var(--green); color:#fff; }

  /* ARC */
  .arc { background:var(--panel); border:2px solid var(--border); border-radius:12px; margin-bottom:12px; overflow:hidden; transition:border-color 0.3s; }
  .arc.arc-done { border-color:var(--green); opacity:0.65; }
  .arc-header { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; user-select:none; }
  .arc-header:hover { background:rgba(255,255,255,0.03); }
  .arc-dot { width:10px; height:10px; border-radius:50%; background:var(--arc-c,var(--yellow)); flex-shrink:0; }
  .arc-name { font-weight:700; font-size:0.95rem; flex:1; }
  .arc-meta { font-size:0.75rem; color:var(--muted); }
  .arc-prog-text { font-size:0.75rem; color:var(--muted); white-space:nowrap; }
  .arc-chevron { font-size:0.8rem; color:var(--muted); transition:transform 0.2s; }
  .arc.open .arc-chevron { transform:rotate(90deg); }
  .arc-mini-bar { height:3px; background:var(--border); }
  .arc-mini-fill { height:100%; background:var(--arc-c,var(--yellow)); transition:width 0.4s; }
  .vols-grid { display:none; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; padding:12px 16px 14px; border-top:1px solid var(--border); }
  .arc.open .vols-grid { display:grid; }
  .vol-item { background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:8px 10px; display:flex; align-items:center; gap:8px; cursor:pointer; transition:all 0.18s; }
  .vol-item:hover { border-color:var(--arc-c,var(--yellow)); }
  .vol-item.done { background:rgba(128,185,24,0.08); border-color:var(--green); }
  .vol-check { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.7rem; flex-shrink:0; transition:all 0.18s; color:var(--muted); }
  .vol-item.done .vol-check { background:var(--green); border-color:var(--green); color:#fff; }
  .vol-item:hover .vol-check { border-color:var(--arc-c,var(--yellow)); }
  .vol-label { font-size:0.78rem; font-weight:600; line-height:1.2; }

  .badge { font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:8px; text-transform:uppercase; letter-spacing:0.4px; }
  .badge-must { background:rgba(230,57,70,0.18); color:var(--red); border:1px solid var(--red); }
  .badge-great { background:rgba(76,201,240,0.13); color:var(--blue); border:1px solid var(--blue); }
  .badge-classic { background:rgba(249,199,79,0.13); color:var(--yellow); border:1px solid var(--yellow); }
  .badge-legend { background:rgba(155,93,229,0.15); color:var(--purple); border:1px solid var(--purple); }

  .salvat-note { font-size:0.72rem; color:var(--yellow); background:rgba(249,199,79,0.08); border:1px solid rgba(249,199,79,0.25); border-radius:6px; padding:6px 10px; margin:0 16px 10px; line-height:1.4; }

  @media(max-width:500px){ header h1{font-size:2rem;} .vols-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));} }
</style>
</head>

// ─── STATE ──────────────────────────────────────────────────────────────────
let stored = JSON.parse(localStorage.getItem('rl4') || '{}');
HEROES.forEach(h => h.arcs.forEach((a,ai) => a.volumes.forEach((v,vi) => {
  const k = `${h.id}.${ai}.${vi}`;
  if (v.read && stored[k] === undefined) stored[k] = true;
})));
save();

function save() { localStorage.setItem('rl4', JSON.stringify(stored)); }
function isRead(hid,ai,vi) { return !!stored[`${hid}.${ai}.${vi}`]; }
function toggle(hid,ai,vi) { const k=`${hid}.${ai}.${vi}`; stored[k]=!stored[k]; save(); render(); }
function arcDone(hid,ai) { return HEROES.find(h=>h.id===hid).arcs[ai].volumes.every((_,vi)=>isRead(hid,ai,vi)); }
function arcProgress(hid,ai) {
  const arc = HEROES.find(h=>h.id===hid).arcs[ai];
  const total = arc.volumes.length;
  const done = arc.volumes.filter((_,vi)=>isRead(hid,ai,vi)).length;
  return {done,total};
}

let activeView = 'library';
let activeGroup = 'all';
let openArcs = {};

function setView(v, btn) {
  activeView = v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabs-wrap').style.display = (v==='library') ? '' : 'none';
  render();
}
function setGroup(id) { activeGroup=id; render(); }

function renderTabs() {
  const el = document.getElementById('tabs');
  let h = `<button class="tab ${activeGroup==='all'?'active':''}" style="--tab-c:var(--yellow)" onclick="setGroup('all')">Todos</button>`;
  GROUPS.forEach(g => {
    h += `<button class="tab ${activeGroup===g.id?'active':''}" style="--tab-c:${g.color}" onclick="setGroup('${g.id}')">${g.label}</button>`;
  });
  el.innerHTML = h;
}

function updateStats() {
  let totVols=0, totDone=0, totArcs=0, doneArcs=0;
  HEROES.forEach(h => h.arcs.forEach((a,ai) => {
    totArcs++;
    a.volumes.forEach((_,vi) => { totVols++; if(isRead(h.id,ai,vi)) totDone++; });
    if(arcDone(h.id,ai)) doneArcs++;
  }));
  const pct = totVols>0 ? Math.round(totDone/totVols*100) : 0;
  document.getElementById('s-total-arcs').textContent = totArcs;
  document.getElementById('s-total-vols').textContent = totVols+' volumes';
  document.getElementById('s-done-arcs').textContent = doneArcs;
  document.getElementById('s-done-vols').textContent = totDone+' volumes';
  document.getElementById('s-left-arcs').textContent = totArcs-doneArcs;
  document.getElementById('s-left-vols').textContent = (totVols-totDone)+' volumes';
  document.getElementById('s-pct2').textContent = pct+'%';
  document.getElementById('s-pct').textContent = pct+'%';
  document.getElementById('s-bar').style.width = pct+'%';
}

function renderArc(h, arc, ai) {
  const {done,total} = arcProgress(h.id,ai);
  const pct = total>0 ? Math.round(done/total*100) : 0;
  const isDone = done===total;
  const arcKey = `${h.id}.${ai}`;
  const isOpen = !!openArcs[arcKey];
  let html = `<div class="arc ${isDone?'arc-done':''} ${isOpen?'open':''}" style="--arc-c:${h.color}" id="arc-${arcKey}">
    <div class="arc-header" onclick="toggleArc('${arcKey}')">
      <div class="arc-dot"></div>
      <div>
        <div class="arc-name">${arc.name} ${isDone?'<span style="color:var(--green);font-size:0.8rem">✓</span>':''}</div>
        <div class="arc-meta">${arc.author}</div>
      </div>
      <span class="badge badge-${arc.badge}" style="margin-left:auto;margin-right:8px">${arc.badgeLabel}</span>
      <span class="arc-prog-text">${done}/${total}</span>
      <span class="arc-chevron">▶</span>
    </div>
    <div style="height:3px;background:var(--border)"><div style="height:100%;width:${pct}%;background:${h.color};transition:width 0.4s"></div></div>
    <div class="vols-grid">`;
  arc.volumes.forEach((v,vi) => {
    const rd = isRead(h.id,ai,vi);
    html += `<div class="vol-item ${rd?'done':''}" onclick="toggle('${h.id}',${ai},${vi})">
      <div class="vol-check">${rd?'✓':'○'}</div>
      <div class="vol-label">${v.label}</div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function render() {
  updateStats();
  renderTabs();
  const app = document.getElementById('app');

  if (activeView === 'library') {
    const heroes = activeGroup==='all' ? HEROES : HEROES.filter(h=>h.group===activeGroup);
    let html = '';
    heroes.forEach(h => {
      const totalV = h.arcs.reduce((s,a)=>s+a.volumes.length,0);
      const doneV  = h.arcs.reduce((s,a,ai)=>s+a.volumes.filter((_,vi)=>isRead(h.id,ai,vi)).length,0);
      const totalA = h.arcs.length;
      const doneA  = h.arcs.filter((_,ai)=>arcDone(h.id,ai)).length;
      const heroPct = totalV>0 ? Math.round(doneV/totalV*100) : 0;
      html += `<div class="hero-block">
        <div class="hero-title" style="color:${h.color}">
          ${h.name}
          <span class="hero-prog">${totalA} livros (${totalV} vol) · ${doneA} lidos (${doneV} vol) · ${heroPct}%</span>
        </div>`;
      h.arcs.forEach((arc,ai) => {
        if (arc.salvatNote) html += `<div class="salvat-note">ℹ️ ${arc.salvatNote}</div>`;
        html += renderArc(h, arc, ai);
      });
      html += `</div>`;
    });
    app.innerHTML = html || '<p style="text-align:center;color:var(--muted);padding:40px">Nada aqui!</p>';
    return;
  }

  // ORDER or MIXED view
  const list = activeView==='order' ? ORDER_BY_CHAR : ORDER_MIXED;
  let html = `<div style="margin-bottom:12px;padding:10px 14px;background:rgba(249,199,79,0.06);border:1px solid rgba(249,199,79,0.2);border-radius:10px;font-size:0.82rem;color:var(--muted)">
    ${activeView==='order'
      ? '🎯 <strong style="color:var(--yellow)">Ordem por personagem</strong> — terminas cada herói antes de passar ao seguinte. Clica em qualquer linha para expandir os volumes.'
      : '🔀 <strong style="color:var(--yellow)">Ordem misturada</strong> — alternância recomendada entre personagens para não te aborreces. A melhor forma de ler tudo.'
    }
  </div>`;

  list.forEach((entry, idx) => {
    const h = HEROES.find(x=>x.id===entry.hid);
    if (!h) return;
    const arc = h.arcs[entry.ai];
    if (!arc) return;
    const {done,total} = arcProgress(h.id,entry.ai);
    const isDone = done===total;
    const arcKey = `${h.id}.${entry.ai}`;
    const isOpen = !!openArcs[`order-${arcKey}`];

    if (activeView==='order') {
      html += `<div class="order-step ${isDone?'done':''}">
        <div class="order-step-num">${idx+1}</div>
        <div class="order-step-body" onclick="toggleOrderArc('order-${arcKey}')">
          <div class="order-step-hero" style="color:${h.color}">${h.name}</div>
          <div class="order-step-name">${arc.name}</div>
          <div class="order-step-author">${arc.author}</div>
          ${entry.tip ? `<div class="order-step-tip">💡 ${entry.tip}</div>` : ''}
        </div>
        <div class="order-step-right">
          <span class="badge badge-${arc.badge}">${arc.badgeLabel}</span>
          <span style="font-size:0.75rem;color:var(--muted)">${done}/${total}</span>
        </div>
      </div>
      ${isOpen ? `<div style="margin:-8px 0 12px;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:0 0 10px 10px"><div class="vols-grid" style="display:grid">${arc.volumes.map((v,vi)=>{const rd=isRead(h.id,entry.ai,vi);return`<div class="vol-item ${rd?'done':''}" onclick="toggle('${h.id}',${entry.ai},${vi})" style="--arc-c:${h.color}"><div class="vol-check">${rd?'✓':'○'}</div><div class="vol-label">${v.label}</div></div>`;}).join('')}</div></div>` : ''}`;
    } else {
      html += `<div class="mixed-step ${isDone?'done':''}" style="--step-c:${h.color}">
        <div class="mixed-header" onclick="toggleOrderArc('order-${arcKey}')">
          <div class="mixed-num">${idx+1}</div>
          <div class="mixed-hero-tag">${h.name}</div>
          <div class="mixed-name">${arc.name}</div>
          <div class="mixed-check" onclick="event.stopPropagation()">${isDone?'✓':'○'}</div>
        </div>
        ${entry.tip ? `<div style="padding:0 14px 10px;font-size:0.78rem;color:#c8c5d8">💡 ${entry.tip}</div>` : ''}
        ${isOpen ? `<div style="padding:0 14px 12px"><div class="vols-grid" style="display:grid">${arc.volumes.map((v,vi)=>{const rd=isRead(h.id,entry.ai,vi);return`<div class="vol-item ${rd?'done':''}" onclick="toggle('${h.id}',${entry.ai},${vi})" style="--arc-c:${h.color}"><div class="vol-check">${rd?'✓':'○'}</div><div class="vol-label">${v.label}</div></div>`;}).join('')}</div></div>` : ''}
      </div>`;
    }
  });

  app.innerHTML = html;
}

function toggleArc(key) { openArcs[key]=!openArcs[key]; render(); }
function toggleOrderArc(key) { openArcs[key]=!openArcs[key]; render(); }

render();
</script>
</body>
</html>
